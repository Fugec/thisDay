name: Enrich Draft Now (one-shot)
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug to enrich"
        required: true
        default: "23-may-2026"
jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Call /blog/enrich
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          echo "Enriching draft: $SLUG"
          RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://thisday.info/blog/enrich?slug=${SLUG}" \
            -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}")
          BODY=$(echo "$RESULT" | head -n -1)
          HTTP_STATUS=$(echo "$RESULT" | tail -n 1 | sed 's/HTTP_STATUS://')
          echo "Response (HTTP $HTTP_STATUS): $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Enrich failed with HTTP $HTTP_STATUS"
            exit 1
          fi
