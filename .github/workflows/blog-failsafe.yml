name: Blog Post Failsafe

# Runs 30 minutes after the blog worker cron (00:31 UTC).
# If the blog worker failed to generate today's post, this workflow
# triggers it manually via POST /blog/publish.
#
# Required GitHub secrets:
#   CF_ACCOUNT_ID        — Cloudflare account ID
#   CF_API_TOKEN         — Cloudflare API token (KV read permission)
#   CF_KV_NAMESPACE_ID   — KV namespace ID for BLOG_AI_KV
#   PUBLISH_SECRET       — The PUBLISH_SECRET Cloudflare Worker secret

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC — 29 min after blog worker cron

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  ensure-post:
    runs-on: ubuntu-latest

    steps:
      - name: Check last_gen_date and trigger if missing
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today (UTC): $TODAY"

          # Read last_gen_date from Cloudflare KV
          KV_URL="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/last_gen_date"
          LAST_GEN=$(curl -s -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" "$KV_URL")
          echo "Last gen date in KV: $LAST_GEN"

          if [ "$LAST_GEN" = "$TODAY" ]; then
            echo "Post already generated for $TODAY — nothing to do."
          else
            echo "No post for $TODAY (last: $LAST_GEN) — triggering blog worker..."
            RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST https://thisday.info/blog/publish \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}")
            BODY=$(echo "$RESULT" | head -n -1)
            STATUS=$(echo "$RESULT" | tail -n 1 | sed 's/HTTP_STATUS://')
            echo "Response ($STATUS): $BODY"
            if [ "$STATUS" != "200" ]; then
              echo "::error::Blog post trigger failed with status $STATUS"
              exit 1
            fi
          fi
