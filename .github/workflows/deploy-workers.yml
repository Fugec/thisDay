name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "js/**"
      - "wrangler*.jsonc"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:

concurrency:
  group: deploy-workers
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check blog worker syntax
        run: |
          node --check js/blog-ai-worker.js
          node --check js/shared/ai-call.js

      # `tests/` is gitignored (see .gitignore) and never reaches this
      # checkout, so it cannot appear here — `node --test` silently ignores
      # nonexistent explicit file arguments with no warning and no failure,
      # so a path under `tests/` in this list would look like real CI coverage
      # while actually running zero tests. Only `tools/*.test.js` files are
      # tracked and can be gated in CI; the `tests/` suite (routes, schema,
      # seo-text, ai-call, date-pages, entity-resolution, content-generation,
      # etc.) must be verified locally before merging any change to
      # js/blog-ai-worker.js or js/shared/ai-call.js.
      - name: Run tracked blog production tests
        run: |
          FILES="tools/archive-indexability.test.js \
            tools/article-capacity-resume.test.js \
            tools/article-groq-work-distribution.test.js \
            tools/article-source-capacity.test.js \
            tools/automatic-article-enrichment.test.js \
            tools/evergreen-history-pipeline.test.js \
            tools/person-human-identity.test.js \
            tools/blog-article-presentation.test.js \
            tools/related-films.test.js"
          # node --test silently ignores a nonexistent explicit file argument
          # instead of failing — verify every listed file actually exists
          # before running, so a future typo'd or untracked path can't turn
          # this gate into a silent no-op again.
          for FILE in $FILES; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Listed test file does not exist in this checkout: $FILE"
              exit 1
            fi
          done
          node --test $FILES

      - name: Dry-run blog worker bundle
        run: npx wrangler@latest deploy --dry-run --config wrangler-blog.jsonc

      - name: Deploy SEO worker
        run: npx wrangler@latest deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy blog worker
        run: npx wrangler@latest deploy --config wrangler-blog.jsonc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy sitemap worker
        run: npx wrangler@latest deploy --config wrangler-sitemap.jsonc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
