name: regen-seo-all
on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Patch SEO meta on all posts
        run: |
          RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://thisday.info/blog/regen-seo?all=true" \
            -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}")
          BODY=$(echo "$RESULT" | head -n -1)
          HTTP_STATUS=$(echo "$RESULT" | tail -n 1 | sed 's/HTTP_STATUS://')
          echo "Response (HTTP $HTTP_STATUS):"
          echo "$BODY" | python3 -m json.tool || echo "$BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::regen-seo failed with HTTP $HTTP_STATUS"
            exit 1
          fi
