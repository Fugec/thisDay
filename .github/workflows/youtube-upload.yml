name: YouTube Auto-Upload

on:
  # Runs every other day at 02:00 UTC (~15 videos/month)
  # Narration capped at 3 bullets (~500 chars each) → ~7 500 chars/month, within 10k free tier
  schedule:
    - cron: '0 2 */2 * *'

  # Allow a manual run from the Actions tab (e.g. to back-fill or re-upload)
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FFmpeg for video encoding + DejaVu fonts for SVG text rendering
      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install npm dependencies
        run: npm install

      - name: Upload new posts to YouTube
        run: node index.js
        env:
          CF_ACCOUNT_ID:          ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:           ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID:     ${{ secrets.CF_KV_NAMESPACE_ID }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_PRIVACY:        ${{ secrets.YOUTUBE_PRIVACY }}
          REUPLOAD_SLUGS:         ${{ secrets.REUPLOAD_SLUGS }}
          R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
