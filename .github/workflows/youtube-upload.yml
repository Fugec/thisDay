name: YouTube Auto-Upload

on:
  # Runs Mon/Tue/Thu/Fri at 13:00 UTC — a US morning slot
  # (about 09:00 Eastern during daylight saving time).
  # Runs after blog post generation at 00:05 UTC and failsafe check at 00:35 UTC.
  # Uses fallback ELEVENLABS_API_KEY_2/3 if primary hits quota.
  schedule:
    - cron: "0 13 * * 1,2,4,5"

  # Allow a manual run from the Actions tab (e.g. to back-fill or re-upload)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: youtube-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Static ffmpeg binary — avoids apt mirror issues with libssh deps.
      # The binary download occasionally fails with a transient "fetch failed"
      # on the runner network, so retry up to two more times before giving up.
      - uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg-1
        continue-on-error: true
        with:
          ffmpeg-version: release
      - name: Retry ffmpeg setup (attempt 2)
        if: steps.setup-ffmpeg-1.outcome == 'failure'
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg-2
        continue-on-error: true
        with:
          ffmpeg-version: release
      - name: Retry ffmpeg setup (attempt 3)
        if: steps.setup-ffmpeg-1.outcome == 'failure' && steps.setup-ffmpeg-2.outcome == 'failure'
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      # DejaVu fonts for SVG text rendering
      - name: Install system dependencies
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install npm dependencies
        run: npm ci

      - name: Upload new posts to YouTube
        run: node index.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_2: ${{ secrets.ELEVENLABS_API_KEY_2 }}
          ELEVENLABS_API_KEY_3: ${{ secrets.ELEVENLABS_API_KEY_3 }}
          YOUTUBE_PRIVACY: ${{ secrets.YOUTUBE_PRIVACY }}
          ALLOW_SILENT_VIDEO: ${{ secrets.ALLOW_SILENT_VIDEO }}
          REUPLOAD_SLUGS: ${{ secrets.REUPLOAD_SLUGS }}
          MAX_UPLOADS_PER_RUN: ${{ secrets.MAX_UPLOADS_PER_RUN }}
          BLOG_WORKER_URL: ${{ secrets.BLOG_WORKER_URL }}
          YOUTUBE_REGEN_SECRET: ${{ secrets.YOUTUBE_REGEN_SECRET }}
          USE_AI_IMAGE: ${{ secrets.USE_AI_IMAGE }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN_2: ${{ secrets.HF_TOKEN_2 }}
          HF_TOKEN_3: ${{ secrets.HF_TOKEN_3 }}
          HF_TOKEN_4: ${{ secrets.HF_TOKEN_4 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          # Vision fallback after Groq's llama-4-scout retires 2026-07-17
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}
