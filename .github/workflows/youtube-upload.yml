name: YouTube Auto-Upload

on:
  # Runs Mon/Tue/Thu/Fri at 01:00 UTC — after blog post is generated at 00:05 and
  # failsafe check at 00:35. Gives the blog worker 55 min to finish.
  # Safety fallback at 02:00 UTC (1h gap) in case of API/quota failure.
  # Uses fallback ELEVENLABS_API_KEY_2/3 if primary hits quota.
  schedule:
    - cron: "0 1 * * 1,2,4,5"
    - cron: "0 2 * * 1,2,4,5"

  # Allow a manual run from the Actions tab (e.g. to back-fill or re-upload)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Static ffmpeg binary — avoids apt mirror issues with libssh deps
      - uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg
        with:
          ffmpeg-version: release

      # DejaVu fonts for SVG text rendering
      - name: Install system dependencies
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install npm dependencies
        run: npm install

      - name: Upload new posts to YouTube
        run: node index.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_2: ${{ secrets.ELEVENLABS_API_KEY_2 }}
          ELEVENLABS_API_KEY_3: ${{ secrets.ELEVENLABS_API_KEY_3 }}
          YOUTUBE_PRIVACY: ${{ secrets.YOUTUBE_PRIVACY }}
          REUPLOAD_SLUGS: ${{ secrets.REUPLOAD_SLUGS }}
          MAX_UPLOADS_PER_RUN: ${{ secrets.MAX_UPLOADS_PER_RUN }}
          BLOG_WORKER_URL: ${{ secrets.BLOG_WORKER_URL }}
          YOUTUBE_REGEN_SECRET: ${{ secrets.YOUTUBE_REGEN_SECRET }}
          USE_AI_IMAGE: ${{ secrets.USE_AI_IMAGE }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN_2: ${{ secrets.HF_TOKEN_2 }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}
