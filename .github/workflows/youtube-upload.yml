name: YouTube Auto-Upload

on:
  # Runs twice on Mon/Wed/Fri/Sun: at 02:00 UTC (picks up overnight articles)
  # and at 10:00 UTC (catches same-day articles generated after the first run).
  # Uses fallback ELEVENLABS_API_KEY_2 if primary hits quota.
  schedule:
    - cron: "0 2 * * 0,1,3,5"
    - cron: "0 10 * * 0,1,3,5"

  # Allow a manual run from the Actions tab (e.g. to back-fill or re-upload)
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # FFmpeg for video encoding + DejaVu fonts for SVG text rendering
      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install npm dependencies
        run: npm install

      - name: Upload new posts to YouTube
        run: node index.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_2: ${{ secrets.ELEVENLABS_API_KEY_2 }}
          YOUTUBE_PRIVACY: ${{ secrets.YOUTUBE_PRIVACY }}
          REUPLOAD_SLUGS: ${{ secrets.REUPLOAD_SLUGS }}
          MAX_UPLOADS_PER_RUN: ${{ secrets.MAX_UPLOADS_PER_RUN }}
          BLOG_WORKER_URL: ${{ secrets.BLOG_WORKER_URL }}
          PUBLISH_SECRET: ${{ secrets.PUBLISH_SECRET }}
