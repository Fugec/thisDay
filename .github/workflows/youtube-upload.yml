name: YouTube Auto-Upload

on:
  # Runs daily at 02:00 UTC — 90 min after the blog worker cron (00:31 UTC),
  # giving the worker time to publish and write to KV before we read it.
  schedule:
    - cron: '0 2 * * *'

  # Allow a manual run from the Actions tab (e.g. to back-fill old posts)
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FFmpeg for video encoding + DejaVu fonts for SVG text rendering
      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install npm dependencies
        run: npm install

      - name: Upload new posts to YouTube
        run: node index.js
        env:
          CF_ACCOUNT_ID:          ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:           ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID:     ${{ secrets.CF_KV_NAMESPACE_ID }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
