<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Under Maintenance | thisDay</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        min-height: 100vh;
      }
      .maintenance-container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }
      .logo {
        max-width: 200px;
        height: auto;
        margin-bottom: 2rem;
      }
      h1 {
        color: #1a1a2e;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }
      p {
        color: #555;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .social-links {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
      }
      .social-links a {
        color: #1a1a2e;
        font-size: 2rem;
        transition:
          transform 0.3s ease,
          color 0.3s ease;
      }
      .social-links a:hover {
        color: #e94560;
        transform: scale(1.2);
      }
      .social-links a:focus {
        outline: 2px solid #e94560;
        outline-offset: 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main class="maintenance-container">
      <img src="/images/logo.png" alt="thisDay Logo" class="logo" />

      <h1>Under Maintenance</h1>

      <p>
        We're currently working on something exciting. Please check back soon
        for updates.
      </p>

      <div class="social-links">
        <a
          href="https://www.facebook.com/profile.php?id=61578009082537"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Facebook"
        >
          <i class="bi bi-facebook"></i>
        </a>
        <a
          href="https://www.instagram.com/thisday.info/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          <i class="bi bi-instagram"></i>
        </a>
        <a
          href="https://www.youtube.com/@thisDay_info/shorts"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="YouTube"
        >
          <i class="bi bi-youtube"></i>
        </a>
      </div>
    </main>
  </body>
</html>
